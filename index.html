<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>رسالة إلى حنين</title>
<style>
body{font-family:Arial,sans-serif;background:#ffe6f0;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.card{background:#fff;padding:30px;border-radius:20px;max-width:700px;box-shadow:0 8px 25px rgba(0,0,0,.15);text-align:center}
h1{color:#e91e63}p{line-height:1.9;font-size:20px}
</style></head><body><div class="card">
<h1>❤️ إلى حنين ❤️</h1>
<p>من أول يوم دخلتي فيه حياتي، وأنا حسيت إن الدنيا بقت أجمل.<br>
كل لحظة معاكي ليها معنى، وكل ضحكة منك بتخليني أنسى أي تعب.<br>
وجودك في حياتي نعمة، وأتمنى أفضل جنبك في كل لحظة.<br><br>
بحبك جدًا ❤️</p>
</div></body></html>
